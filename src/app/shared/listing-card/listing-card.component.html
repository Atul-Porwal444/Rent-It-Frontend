<div class="custom-card h-100" (click)="handleClick()">
  
  <div class="card-img-wrapper position-relative">
    <div class="blurred-backdrop" [style.background-image]="'url(' + currentImage + ')'"></div>
    <img [src]="currentImage" class="card-img-top position-relative z-1" alt="Listing">
    
    <div class="type-badge shadow-sm">
      {{ type === 'ROOM' ? 'Room' : 'Roommate' }}
    </div>
  </div>

  <div class="card-body p-3 d-flex flex-column">
    <h4 class="fw-bold text-white mb-1 fs-8">
      ₹{{ data.rentAmount || '0' }} <span class="text-secondary fw-normal fs-10">/mo</span>
    </h4>
    <p class="text-secondary small mb-0 mt-auto text-truncate">
      <i class="bi bi-geo-alt-fill text-danger me-1"></i>
      {{ data.city }}, {{ data.state }} - {{ data.pincode }}
    </p>
  </div>
</div>
