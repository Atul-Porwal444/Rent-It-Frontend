<div class="page-wrapper">
  
  <div class="search-header-section border-bottom custom-border pb-4 pt-5 px-4">
    <div class="container-fluid max-w-custom">
      <div class="row align-items-center">
        <div class="col-md-5">
          <h2 class="fw-bold text-white mb-1">Find Rooms</h2>
          <p class="text-secondary small mb-md-0">Showing {{ totalElements }} available properties</p>
        </div>
        <div class="col-md-7">
          <div class="position-relative">
            <i class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3 text-secondary fs-5"></i>
            
            <input type="text" 
                   class="form-control form-control-lg custom-search-input ps-5 rounded-pill" 
                   placeholder="Search by city, area, or zip code..." 
                   [(ngModel)]="filters.searchQuery"
                   (keyup.enter)="applyFilters()">
            
            <button class="btn btn-light position-absolute top-50 end-0 translate-middle-y me-2 rounded-pill px-4 fw-bold" 
                    style="padding: 0.4rem;" 
                    (click)="applyFilters()">
              Search
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="container-fluid max-w-custom py-4 px-4">
    <div class="row g-4">
      
      <div class="col-lg-3">
        <div class="filter-sidebar p-4 rounded-4 sticky-top" style="top: 20px; z-index: 10;">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h6 class="fw-bold text-white mb-0"><i class="bi bi-sliders me-2"></i> Filters</h6>
            <button class="btn btn-link text-secondary p-0 text-decoration-none small" (click)="resetFilters()">Clear All</button>
          </div>

          <div class="mb-4">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <label class="text-secondary small fw-bold text-uppercase tracking-wide mb-0">Max Rent</label>
              <span class="badge bg-primary bg-opacity-10 text-primary border border-primary border-opacity-25">
                Up to ₹{{ filters.maxRent }}
              </span>
            </div>
            <input type="range" class="form-range custom-range" min="1000" max="100000" step="500" 
                   [(ngModel)]="filters.maxRent" 
                   (change)="applyFilters()"> <div class="d-flex justify-content-between mt-1">
              <small class="text-secondary" style="font-size: 0.7rem;">₹1k</small>
              <small class="text-secondary" style="font-size: 0.7rem;">₹100k</small>
            </div>
          </div>

          <div class="mb-4">
            <label class="text-secondary small fw-bold mb-2 text-uppercase tracking-wide">BHK Type</label>
            <select class="form-select form-select-sm custom-input" [(ngModel)]="filters.bhkType" (ngModelChange)="applyFilters()">
              <option value="">Any Configuration</option>
              <option value="1RK">1 RK</option>
              <option value="1BHK">1 BHK</option>
              <option value="2BHK">2 BHK</option>
              <option value="3BHK">3 BHK+</option>
            </select>
          </div>

          <div class="mb-4">
            <label class="text-secondary small fw-bold mb-2 text-uppercase tracking-wide">Furnishing</label>
            <div class="form-check custom-checkbox mb-2">
              <input class="form-check-input" type="checkbox" id="furn1" [(ngModel)]="filters.isFurnished" (ngModelChange)="applyFilters()">
              <label class="form-check-label text-light small" for="furn1">Fully Furnished</label>
            </div>
          </div>

          <div class="mb-4">
            <label class="text-secondary small fw-bold mb-2 text-uppercase tracking-wide">Amenities</label>
            <div class="form-check custom-checkbox mb-2">
              <input class="form-check-input" type="checkbox" id="am1" [(ngModel)]="filters.hasParking" (ngModelChange)="applyFilters()">
              <label class="form-check-label text-light small" for="am1">Parking Available</label>
            </div>
            <div class="form-check custom-checkbox mb-2">
              <input class="form-check-input" type="checkbox" id="am2" [(ngModel)]="filters.waterSupply24x7" (ngModelChange)="applyFilters()">
              <label class="form-check-label text-light small" for="am2">24x7 Water Supply</label>
            </div>
            <div class="form-check custom-checkbox mb-2">
              <input class="form-check-input" type="checkbox" id="am3" [(ngModel)]="filters.electricityBackup" (ngModelChange)="applyFilters()">
              <label class="form-check-label text-light small" for="am3">Power Backup</label>
            </div>
          </div>
          
          </div>
      </div>

      <div class="col-lg-9">
        
        <div class="d-flex justify-content-between align-items-center mb-3">
          <p class="text-secondary small mb-0">Showing results for your criteria</p>
          <div class="d-flex align-items-center gap-2">
            <label class="text-secondary small mb-0">Sort:</label>
            
            <select class="form-select form-select-sm custom-input border-0 bg-transparent text-white fw-bold shadow-none" 
                    style="width: auto; cursor: pointer;" 
                    [(ngModel)]="filters.sortBy" 
                    (ngModelChange)="sortDataFrontend()">
              <option value="postedOn" class="bg-dark text-white">Newest First</option>
              <option value="rentAmountAsc" class="bg-dark text-white">Price: Low to High</option>
              <option value="rentAmountDesc" class="bg-dark text-white">Price: High to Low</option>
            </select>
          </div>
        </div>

        <div class="row g-4 mb-5" *ngIf="isLoading">
          <div class="col-12 col-md-6 col-xl-4" *ngFor="let item of [1,2,3,4,5,6]">
            <div class="glass-card overflow-hidden h-100 border-0 rounded-4" style="background-color: rgba(20, 20, 20, 0.6); border: 1px solid rgba(255, 255, 255, 0.08);">
              <div class="skeleton" style="height: 200px; width: 100%; border-radius: 0;"></div>
              <div class="p-3">
                <div class="skeleton mb-3" style="height: 18px; width: 30%; border-radius: 20px;"></div>
                <div class="skeleton mb-2" style="height: 24px; width: 85%; border-radius: 6px;"></div>
                <div class="skeleton mb-4" style="height: 14px; width: 60%; border-radius: 6px;"></div>
                <div class="d-flex align-items-center mt-3 pt-3 border-top custom-border">
                  <div class="skeleton rounded-circle me-2" style="width: 32px; height: 32px;"></div>
                  <div class="skeleton" style="height: 14px; width: 40%; border-radius: 6px;"></div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="row g-4 mb-5" *ngIf="!isLoading">
          <div class="col-12 col-md-6 col-xl-4" *ngFor="let room of rooms">
            <app-listing-card [data]="room" type="ROOM"></app-listing-card>
          </div>
          
          <div *ngIf="rooms.length === 0" class="col-12 text-center py-5 my-5 bg-darker rounded-4 border custom-border animate-fade-in">
            <i class="bi bi-search text-secondary opacity-50 mb-3 d-block" style="font-size: 3rem;"></i>
            <h4 class="text-white fw-bold">No rooms match your filters</h4>
            <p class="text-secondary">Try broadening your search criteria, like increasing the max rent.</p>
            <button class="btn btn-outline-light mt-3 px-4 rounded-pill" (click)="resetFilters()">Clear Filters</button>
          </div>
        </div>

        <div class="d-flex justify-content-center mt-4" *ngIf="totalPages > 1 && !isLoading">
          <ul class="pagination custom-pagination gap-2">
            <li class="page-item" [class.disabled]="currentPage === 0">
              <button class="page-link" (click)="prevPage()"><i class="bi bi-chevron-left"></i></button>
            </li>
            
            <li class="page-item" *ngFor="let page of visiblePageNumbers" [class.active]="currentPage === page" [class.disabled]="page === '...'">
              <button class="page-link" (click)="goToPage(page)">
                {{ page === '...' ? '...' : $any(page) + 1 }}
              </button>
            </li>
            
            <li class="page-item" [class.disabled]="currentPage === totalPages - 1">
              <button class="page-link" (click)="nextPage()"><i class="bi bi-chevron-right"></i></button>
            </li>
          </ul>
        </div>

      </div>
    </div>
  </div>
</div>
