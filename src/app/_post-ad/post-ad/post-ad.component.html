<div class="modal-overlay">
  <div class="modal-card shadow-lg glass-card">
    
    <div class="modal-header d-flex justify-content-between align-items-center px-4 py-3 border-bottom custom-border">
      <h5 class="text-white fw-bold mb-0" style="font-size: 1.1rem;">
        <div class="icon-circle-small d-inline-flex align-items-center justify-content-center rounded-circle me-2" 
             [ngClass]="adType === 'room' ? 'bg-primary-subtle text-primary' : 'bg-info-subtle text-info'">
          <i class="bi" [class.bi-house-add-fill]="adType === 'room'" [class.bi-people-fill]="adType === 'roommate'"></i>
        </div>
        Post {{ adType === 'room' ? 'Room' : 'Roommate Request' }}
      </h5>
      <button class="btn-close btn-close-white" style="font-size: 0.8rem;" (click)="close.emit()"></button>
    </div>

    <div class="modal-body p-4 text-white custom-scrollbar">
      <form (ngSubmit)="onSubmit()" #adForm="ngForm" autocomplete="off">

        <div class="mb-4">
          <label class="form-label text-secondary small fw-bold text-uppercase tracking-wide mb-2">
            <i class="bi bi-images text-light me-1"></i> Upload Photos (Max 5)<br><small style="font-size: 0.6rem;">Size should be less than 5MB</small>
          </label>
          <div class="d-flex gap-2 overflow-auto py-1 hide-scrollbar">
            <label class="image-upload-box d-flex flex-column align-items-center justify-content-center rounded text-secondary transition-all" 
                   style="min-width: 80px; height: 80px; cursor: pointer; background: rgba(0,0,0,0.3);">
              <i class="bi bi-camera fs-5 mb-1 text-primary"></i>
              <span style="font-size: 0.65rem; font-weight: 500;">Add Photo</span>
              <input type="file" multiple accept="image/png, image/jpeg" hidden (change)="onFileSelected($event)">
            </label>

            <div *ngFor="let img of imagePreviews; let i = index" class="position-relative hover-reveal">
              <img [src]="img" class="rounded object-fit-cover shadow-sm border custom-border" style="width: 80px; height: 80px;">
              <button type="button" class="btn btn-sm btn-danger rounded-circle position-absolute top-0 end-0 m-1 d-flex align-items-center justify-content-center p-0 delete-btn" 
                      (click)="removeImage(i)"><i class="bi bi-x"></i></button>
            </div>
          </div>
          <small class="text-danger mt-1 d-block" style="font-size: 0.7rem;" *ngIf="selectedImages.length >= 5">Maximum of 5 images reached.</small>
        </div>

        <hr class="custom-border my-4 opacity-50">

        <div class="row g-3 mb-4">
          
          <div class="col-md-6">
            <label class="form-label text-secondary small mb-1"><i class="bi bi-map text-info me-1"></i> State</label>
            <input type="text" class="form-control custom-modal-input" 
                   [(ngModel)]="formData.state" name="state" required 
                   placeholder="Select State..." list="stateList">
            <datalist id="stateList">
              <option *ngFor="let state of indianStates" [value]="state"></option>
            </datalist>
          </div>

          <div class="col-md-6">
            <label class="form-label text-secondary small mb-1"><i class="bi bi-building text-success me-1"></i> City</label>
            <input type="text" class="form-control custom-modal-input" 
                   [(ngModel)]="formData.city" name="city" required 
                   placeholder="Type to search..." list="cityList" maxlength="30">
            <datalist id="cityList">
              <option *ngFor="let city of indianCities" [value]="city"></option>
            </datalist>
          </div>

          <div class="col-md-6">
            <label class="form-label text-secondary small mb-1"><i class="bi bi-geo-alt text-danger me-1"></i> Location / Area</label>
            <input type="text" class="form-control custom-modal-input" 
                   [(ngModel)]="formData.location" name="loc" required 
                   placeholder="e.g. Vijay Nagar" maxlength="40">
          </div>

          <div class="col-md-6">
            <label class="form-label text-secondary small mb-1"><i class="bi bi-mailbox text-warning me-1"></i> Pincode</label>
            <input type="number" class="form-control custom-modal-input" 
                   [(ngModel)]="formData.pincode" name="pincode" required 
                   placeholder="e.g. 452010" min="100000" max="999999" 
                   (keydown)="preventNegative($event)">
          </div>

          <div class="col-md-6">
            <label class="form-label text-secondary small mb-1"><i class="bi bi-house text-primary me-1"></i> BHK Type</label>
            <select class="form-select custom-modal-input" [(ngModel)]="formData.bhkType" name="bhk">
              <option value="1RK" class="bg-dark text-white">1 RK</option>
              <option value="1BHK" class="bg-dark text-white">1 BHK</option>
              <option value="2BHK" class="bg-dark text-white">2 BHK</option>
              <option value="3BHK" class="bg-dark text-white">3 BHK</option>
            </select>
          </div>
          
          <div class="col-md-6">
            <label class="form-label text-secondary small mb-1"><i class="bi bi-layers text-info me-1"></i> Floor No.</label>
            <input type="number" min="0" max="200" class="form-control custom-modal-input" 
                   [(ngModel)]="formData.floorNumber" name="floor" 
                   (keydown)="preventNegative($event)" required placeholder="e.g. 2">
          </div>
          
          <div class="col-md-6">
            <label class="form-label text-secondary small mb-1"><i class="bi bi-currency-rupee text-success me-1"></i> Rent / Month</label>
            <input type="number" min="0" max="1000000" class="form-control custom-modal-input text-success fw-bold" 
                   [(ngModel)]="formData.rentAmount" name="rent" 
                   (keydown)="preventNegative($event)" required placeholder="0">
            <small class="text-danger d-block mt-1" style="font-size: 0.7rem;" *ngIf="formData.rentAmount > 1000000">Exceeds limit.</small>
          </div>

          <div class="col-md-6" *ngIf="adType === 'room'">
            <label class="form-label text-secondary small mb-1"><i class="bi bi-safe text-warning me-1"></i> Security Deposit</label>
            <input type="number" min="0" max="1000000" class="form-control custom-modal-input" 
                   [(ngModel)]="formData.securityDeposit" name="deposit"
                   (keydown)="preventNegative($event)" required placeholder="0">
          </div>
        </div>

        <div *ngIf="adType === 'roommate'" class="row g-3 mb-4 p-3 rounded-3" style="background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.05);">
          
          <div class="col-md-6">
            <label class="form-label text-secondary small mb-1"><i class="bi bi-gender-ambiguous text-primary me-1"></i> Looking For</label>
            <select class="form-select custom-modal-input" [(ngModel)]="formData.lookingForGender" name="gender">
              <option value="Male" class="bg-dark text-white">Male</option>
              <option value="Female" class="bg-dark text-white">Female</option>
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label text-secondary small mb-1"><i class="bi bi-cup-hot text-warning me-1"></i> Diet Preference</label>
            <select class="form-select custom-modal-input" [(ngModel)]="formData.dietaryPreference" name="diet">
              <option value="No Preference" class="bg-dark">No Preference</option>
              <option value="Vegetarian" class="bg-dark">Vegetarian</option>
              <option value="Non-Vegetarian" class="bg-dark">Non-Vegetarian</option>
              <option value="Vegan" class="bg-dark">Vegan</option>
            </select>
          </div>

          <div class="col-md-12">
            <label class="form-label text-secondary small mb-1"><i class="bi bi-book text-info me-1"></i> Religion Preference</label>
            <select class="form-select custom-modal-input" [(ngModel)]="formData.religionPreference" name="religion">
              <option value="No Preference" class="bg-dark">No Preference</option>
              <option value="Hindu" class="bg-dark">Hindu</option>
              <option value="Muslim" class="bg-dark">Muslim</option>
              <option value="Sikh" class="bg-dark">Sikh</option>
              <option value="Christian" class="bg-dark">Christian</option>
              <option value="Other" class="bg-dark">Other</option>
            </select>
          </div>

          <div class="col-6">
            <label class="form-label text-secondary small mb-1"><i class="bi bi-person-check text-secondary me-1"></i> Current Roommates</label>
            <input type="number" min="0" max="10" class="form-control custom-modal-input text-center" 
                   [(ngModel)]="formData.currentRoommates" name="curr" (keydown)="preventNegative($event)" required>
          </div>

          <div class="col-6">
            <label class="form-label text-secondary small mb-1"><i class="bi bi-person-add text-secondary me-1"></i> Needed Roommates</label>
            <input type="number" min="1" max="10" class="form-control custom-modal-input text-center" 
                   [(ngModel)]="formData.neededRoommates" name="needed" (keydown)="preventNegative($event)" required>
          </div>
        </div>

        <hr class="custom-border my-4 opacity-50">

        <div class="mb-4">
          <label class="form-label text-secondary small fw-bold text-uppercase tracking-wide mb-3">
            <i class="bi bi-stars text-warning me-1"></i> Amenities
          </label>
          <div class="row g-2">
            <div class="col-sm-6">
              <div class="d-flex align-items-center justify-content-between p-2 rounded-3 toggle-row">
                <span class="small text-light"><i class="bi bi-lamp me-2 text-primary"></i>Furnished</span>
                <div class="form-check form-switch custom-switch mb-0">
                  <input class="form-check-input m-0" type="checkbox" [(ngModel)]="formData.isFurnished" name="furn">
                </div>
              </div>
            </div>
            <div class="col-sm-6">
              <div class="d-flex align-items-center justify-content-between p-2 rounded-3 toggle-row">
                <span class="small text-light"><i class="bi bi-car-front me-2 text-warning"></i>Parking</span>
                <div class="form-check form-switch custom-switch mb-0">
                  <input class="form-check-input m-0" type="checkbox" [(ngModel)]="formData.hasParking" name="park">
                </div>
              </div>
            </div>
            <div class="col-sm-6">
              <div class="d-flex align-items-center justify-content-between p-2 rounded-3 toggle-row">
                <span class="small text-light"><i class="bi bi-droplet-fill me-2 text-info"></i>24x7 Water</span>
                <div class="form-check form-switch custom-switch mb-0">
                  <input class="form-check-input m-0" type="checkbox" [(ngModel)]="formData.waterSupply24x7" name="water">
                </div>
              </div>
            </div>
            <div class="col-sm-6">
              <div class="d-flex align-items-center justify-content-between p-2 rounded-3 toggle-row">
                <span class="small text-light"><i class="bi bi-lightning-charge me-2 text-light"></i>Power Backup</span>
                <div class="form-check form-switch custom-switch mb-0">
                  <input class="form-check-input m-0" type="checkbox" [(ngModel)]="formData.electricityBackup" name="elec">
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label text-secondary small mb-1"><i class="bi bi-card-text text-success me-1"></i> Description</label>
          <textarea class="form-control custom-modal-input" rows="3" 
            [(ngModel)]="formData.description" name="desc" 
            placeholder="Describe the property, rules, or what kind of person you are looking for..." 
            [maxlength]="DESC_MAX_LENGTH">
          </textarea>
          <div class="char-counter text-secondary mt-1" style="font-size: 0.7rem;">
            {{ formData.description?.length || 0 }} / {{ DESC_MAX_LENGTH }}
          </div>
        </div>

        <div class="d-grid mt-2">
          <button type="submit" class="btn btn-primary primary-btn fw-bold py-2 rounded-3" [disabled]="adForm.invalid || isSubmitting">
            <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm me-2"></span>
            {{ isSubmitting ? 'Posting...' : 'Post ' + (adType === 'room' ? 'Room Ad' : 'Roommate Request') }}
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
