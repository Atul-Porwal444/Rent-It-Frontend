<div class="modal-overlay" [ngClass]="{'fade-out': isClosing}">
  
  <div class="global-blocker" *ngIf="isProcessingGlobally"></div>
  <div class="custom-toast glass-card d-flex align-items-center gap-2" [ngClass]="toastType" *ngIf="toastMessage" style="z-index: 9999;">
    <i class="bi fs-5" [ngClass]="toastType === 'error' ? 'bi-x-circle-fill text-danger' : 'bi-check-circle-fill text-success'"></i>
    <span class="text-white small fw-medium">{{ toastMessage }}</span>
  </div>

  <div class="modal-card shadow-lg glass-card" [ngClass]="{'scale-out': isClosing}">
    
    <div class="modal-header d-flex justify-content-between align-items-center px-4 py-3 border-bottom custom-border">
      <h5 class="text-white fw-bold mb-0" style="font-size: 1.1rem;">
        <div class="icon-circle-small d-inline-flex align-items-center justify-content-center rounded-circle me-2" 
             [ngClass]="adType === 'room' ? 'bg-primary-subtle text-primary' : 'bg-info-subtle text-info'">
          <i class="bi" [class.bi-house-add-fill]="adType === 'room'" [class.bi-people-fill]="adType === 'roommate'"></i>
        </div>
        Post {{ adType === 'room' ? 'Room' : 'Roommate Request' }}
      </h5>
      <button class="btn-close btn-close-white" style="font-size: 0.8rem;" (click)="closeModal()"></button>
    </div>

    <div class="modal-body p-4 text-white custom-scrollbar">
      <form (ngSubmit)="onSubmit()" #adForm="ngForm" autocomplete="off">

        <div class="mb-4">
          <label class="form-label text-secondary small fw-bold text-uppercase tracking-wide mb-2">
            <i class="bi bi-images text-light me-1"></i> Upload Photos (Max 5)
          </label>
          
          <div class="d-flex flex-wrap gap-3">
            <div class="position-relative hover-reveal" *ngFor="let preview of imagePreviews; let i = index" style="width: 80px; height: 80px;">
              <img [src]="preview" class="rounded-3 border custom-border w-100 h-100 object-fit-cover shadow-sm">
              <button type="button" class="btn btn-danger delete-btn position-absolute top-0 end-0 translate-middle rounded-circle p-0 d-flex align-items-center justify-content-center shadow" (click)="removeImage(i)">
                <i class="bi bi-x"></i>
              </button>
            </div>

            <div class="image-upload-box rounded-3 d-flex flex-column align-items-center justify-content-center position-relative transition-all cursor-pointer" 
                 style="width: 80px; height: 80px; background: rgba(255,255,255,0.02);" 
                 *ngIf="imagePreviews.length < 5">
              <i class="bi bi-plus-lg fs-3 text-secondary"></i>
              <input type="file" multiple accept=".png, .jpg, .jpeg" class="position-absolute w-100 h-100 opacity-0" style="cursor: pointer;" (change)="onImageSelect($event)">
            </div>
          </div>
        </div>

        <div class="row g-4 mb-4">
          <div class="col-md-6">
            <label class="form-label text-secondary small mb-1">State</label>
            <select class="form-select custom-modal-input" [(ngModel)]="formData.state" name="state" required>
              <option value="" disabled selected>Select State</option>
              <option *ngFor="let state of indianStates" [value]="state">{{state}}</option>
            </select>
          </div>
          <div class="col-md-6 position-relative">
            <label class="form-label text-secondary small mb-1">City</label>
            
            <input type="text" class="form-control custom-modal-input" 
                   [(ngModel)]="formData.city" name="city" 
                   placeholder="e.g. Indore" required
                   autocomplete="off"
                   (input)="filterCities()"
                   (focus)="filterCities()"
                   (blur)="hideDropdownDelay()">
            
            <ul class="city-dropdown custom-scrollbar" *ngIf="showCityDropdown">
              <li class="city-item" *ngFor="let city of filteredCities" (click)="selectCity(city)">
                <i class="bi bi-geo me-2 text-secondary"></i> {{ city }}
              </li>
            </ul>
          </div>
        </div>

        <div class="row g-4 mb-4">
          <div class="col-md-8">
            <label class="form-label text-secondary small mb-1">Street / Locality</label>
            <input type="text" class="form-control custom-modal-input" [(ngModel)]="formData.location" name="location" placeholder="e.g. Vijay Nagar" required>
          </div>
          <div class="col-md-4">
            <label class="form-label text-secondary small mb-1">Pincode</label>
            <input type="number" class="form-control custom-modal-input" 
                   [(ngModel)]="formData.pincode" name="pincode" required 
                   placeholder="e.g. 452010" min="100000" max="999999" 
                   (keydown)="preventNegative($event)">
                   <small class="text-danger d-block mt-1" style="font-size: 0.7rem;" *ngIf="(formData.pincode > 999999 || formData.pincode < 100000) && formData.pincode !== ''">Enter 6-digit valid pincode</small>
          </div>
        </div>

        <div class="row g-4 mb-4 border-top custom-border pt-4 mt-1">
          <div class="col-md-4">
            <label class="form-label text-secondary small mb-1">BHK Type</label>
            <select class="form-select custom-modal-input" [(ngModel)]="formData.bhkType" name="bhkType" required>
              <option value="" disabled selected>Select Type</option>
              <option value="1RK">1 RK</option>
              <option value="1BHK">1 BHK</option>
              <option value="2BHK">2 BHK</option>
              <option value="3BHK">3 BHK+</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label text-secondary small mb-1"><i class="bi bi-layers text-info me-1"></i> Floor No.</label>
            <input type="number" min="0" max="200" class="form-control custom-modal-input" 
                   [(ngModel)]="formData.floorNumber" name="floor" 
                   (keydown)="preventNegative($event)" required placeholder="e.g. 2">
                   <small class="text-danger d-block mt-1" style="font-size: 0.7rem;" *ngIf="(formData.pincode > 999999 || formData.pincode < 100000) && formData.pincode !== ''">Enter 6-digit valid pincode</small>
          </div>
          <div class="col-md-4">
            <label class="form-label text-secondary small mb-1">Rent Amount (₹)</label>
            <input type="number" class="form-control custom-modal-input" [(ngModel)]="formData.rentAmount" name="rent" placeholder="Per month" required (keydown)="preventNegative($event)">
          </div>
          <div class="col-md-4">
            <label class="form-label text-secondary small mb-1">Security Deposit (₹)</label>
            <input type="number" class="form-control custom-modal-input" [(ngModel)]="formData.securityDeposit" name="deposit" placeholder="Refundable" required (keydown)="preventNegative($event)">
          </div>
        </div>

        <ng-container *ngIf="adType === 'roommate'">
          <div class="row g-4 mb-4 border-top custom-border pt-4 mt-1">
            <div class="col-md-4">
              <label class="form-label text-secondary small mb-1">Current Mates</label>
              <input type="number" class="form-control custom-modal-input" [(ngModel)]="formData.currentRoommates" name="curr" required (keydown)="preventNegative($event)">
            </div>
            <div class="col-md-4">
              <label class="form-label text-secondary small mb-1">Needed</label>
              <input type="number" class="form-control custom-modal-input" [(ngModel)]="formData.neededRoommates" name="need" required (keydown)="preventNegative($event)">
            </div>
            <div class="col-md-4">
              <label class="form-label text-secondary small mb-1">Gender</label>
              <select class="form-select custom-modal-input" [(ngModel)]="formData.lookingForGender" name="gen" required>
                <option value="" disabled selected>Preference</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Any">Any</option>
              </select>
            </div>
          </div>
          <div class="row g-4 mb-4">
            <div class="col-md-6">
              <label class="form-label text-secondary small mb-1">Dietary Preference</label>
              <select class="form-select custom-modal-input" [(ngModel)]="formData.dietaryPreference" name="diet" required>
                <option value="" disabled selected>Preference</option>
                <option value="Vegetarian">Vegetarian</option>
                <option value="Non-Vegetarian">Non-Vegetarian</option>
                <option value="Vegan">Vegan</option>
                <option value="Any">No Preference</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label text-secondary small mb-1">Religion Preference</label>
              <select class="form-select custom-modal-input" [(ngModel)]="formData.religionPreference" name="rel" required>
                <option value="" disabled selected>Preference</option>
                <option value="Hindu">Hindu</option>
                <option value="Muslim">Muslim</option>
                <option value="Sikh">Sikh</option>
                <option value="Christian">Christian</option>
                <option value="Other">Other</option>
                <option value="Any">No Preference</option>
              </select>
            </div>
          </div>
        </ng-container>

        <div class="mb-4 border-top custom-border pt-4 mt-1">
          <label class="form-label text-secondary small fw-bold text-uppercase tracking-wide mb-3">Amenities</label>
          <div class="row g-3">
            <div class="col-sm-6">
              <div class="d-flex align-items-center justify-content-between p-2 rounded-3" style="background: rgba(255,255,255,0.03);">
                <span class="small text-light"><i class="bi bi-lamp me-2 text-light"></i>Furnished</span>
                <div class="form-check form-switch custom-switch mb-0">
                  <input class="form-check-input m-0" type="checkbox" [(ngModel)]="formData.isFurnished" name="furn">
                </div>
              </div>
            </div>
            <div class="col-sm-6">
              <div class="d-flex align-items-center justify-content-between p-2 rounded-3" style="background: rgba(255,255,255,0.03);">
                <span class="small text-light"><i class="bi bi-car-front me-2 text-light"></i>Parking</span>
                <div class="form-check form-switch custom-switch mb-0">
                  <input class="form-check-input m-0" type="checkbox" [(ngModel)]="formData.hasParking" name="park">
                </div>
              </div>
            </div>
            <div class="col-sm-6">
              <div class="d-flex align-items-center justify-content-between p-2 rounded-3" style="background: rgba(255,255,255,0.03);">
                <span class="small text-light"><i class="bi bi-droplet me-2 text-light"></i>24x7 Water</span>
                <div class="form-check form-switch custom-switch mb-0">
                  <input class="form-check-input m-0" type="checkbox" [(ngModel)]="formData.waterSupply24x7" name="water">
                </div>
              </div>
            </div>
            <div class="col-sm-6">
              <div class="d-flex align-items-center justify-content-between p-2 rounded-3" style="background: rgba(255,255,255,0.03);">
                <span class="small text-light"><i class="bi bi-lightning-charge me-2 text-light"></i>Power Backup</span>
                <div class="form-check form-switch custom-switch mb-0">
                  <input class="form-check-input m-0" type="checkbox" [(ngModel)]="formData.electricityBackup" name="elec">
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label text-secondary small mb-1"><i class="bi bi-card-text text-success me-1"></i> Description</label>
          <textarea class="form-control custom-modal-input" rows="2" 
            [(ngModel)]="formData.description" name="desc" 
            placeholder="Describe the property, rules, or what kind of person you are looking for..." 
            [maxlength]="DESC_MAX_LENGTH">
          </textarea>
          <div class="char-counter text-secondary mt-1" style="font-size: 0.7rem;">
            {{ formData.description?.length || 0 }} / {{ DESC_MAX_LENGTH }}
          </div>
        </div>

        <div class="d-grid mt-2">
          <button type="submit" class="btn btn-primary primary-btn fw-bold py-2 rounded-3" [disabled]="adForm.invalid || isSubmitting">
            <span *ngIf="isSubmitting" class="spinner-border spinner-border-sm me-2"></span>
            {{ isSubmitting ? 'Posting...' : 'Publish Post' }}
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
