<div class="auth-wrapper d-flex align-items-center justify-content-center">
    <div class="auth-card p-4 p-sm-5 rounded-4 shadow-lg text-center">
      
      <div *ngIf="step === 1" class="animate-fade-in">
        <div class="mx-auto d-flex align-items-center justify-content-center rounded-circle mb-4" 
             style="width: 70px; height: 70px; background-color: rgba(13, 110, 253, 0.15); color: #6ea8fe;">
          <i class="bi bi-key-fill" style="font-size: 2rem;"></i>
        </div>
        
        <h3 class="fw-bold text-white mb-2">Forgot Password?</h3>
        <p class="text-secondary small mb-4">No worries, we'll send you reset instructions.</p>
  
        <form (ngSubmit)="requestOtp()" #step1Form="ngForm">
          
          <div class="mb-4 text-start">
            <label class="form-label text-light small mb-2">Email Address</label>
            <input 
              type="email" 
              class="form-control custom-auth-input" 
              name="email"
              [(ngModel)]="form.email" 
              required
              email
              placeholder="Enter your registered email">
          </div>
  
          <div class="alert alert-danger bg-danger bg-opacity-10 border-danger border-opacity-25 text-danger py-2 small mb-3" *ngIf="errorMessage">
            <i class="bi bi-exclamation-circle-fill me-1"></i> {{ errorMessage }}
          </div>
  
          <div class="d-grid">
            <button type="submit" class="btn btn-primary primary-btn fw-bold py-2" [disabled]="step1Form.invalid || isLoading">
              <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
              {{ isLoading ? 'Sending...' : 'Send Reset Code' }}
            </button>
          </div>
        </form>
      </div>
  
      <div *ngIf="step === 2" class="animate-fade-in">
        <div class="mx-auto d-flex align-items-center justify-content-center rounded-circle mb-3" 
             style="width: 60px; height: 60px; background-color: rgba(25, 135, 84, 0.15); color: #20c997;">
          <i class="bi bi-shield-lock-fill" style="font-size: 1.8rem;"></i>
        </div>
        
        <h3 class="fw-bold text-white mb-1">Set New Password</h3>
        <p class="text-secondary small mb-4">Code sent to <span class="text-white fw-bold">{{ form.email }}</span></p>
  
        <form (ngSubmit)="resetPassword()" #step2Form="ngForm">
          
          <div class="mb-3 text-start">
            <label class="form-label text-light small mb-2">6-Digit Code</label>
            <input 
              type="text" 
              class="form-control custom-auth-input text-center fw-bold letter-spacing-2" 
              [(ngModel)]="form.otp" 
              name="otp" 
              placeholder="••••••" 
              maxlength="6"
              required>
          </div>
  
          <div class="mb-3 text-start position-relative">
            <label class="form-label text-light small mb-2">New Password</label>
            <input 
              [type]="showPassword ? 'text' : 'password'" 
              class="form-control custom-auth-input pe-5" 
              name="newPassword"
              [(ngModel)]="form.newPassword" 
              required
              placeholder="Enter new password">
            <i class="bi position-absolute end-0 me-3 text-secondary" style="top: 38px; cursor: pointer;"
               [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'" (click)="showPassword = !showPassword"></i>
          </div>
  
          <div class="mb-4 text-start">
            <label class="form-label text-light small mb-2">Confirm Password</label>
            <input 
              [type]="showPassword ? 'text' : 'password'" 
              class="form-control custom-auth-input" 
              name="confirmPassword"
              [(ngModel)]="form.confirmPassword" 
              required
              placeholder="Confirm new password">
          </div>
  
          <div class="alert alert-danger bg-danger bg-opacity-10 border-danger border-opacity-25 text-danger py-2 small mb-3" *ngIf="errorMessage">
            <i class="bi bi-exclamation-circle-fill me-1"></i> {{ errorMessage }}
          </div>
  
          <div class="d-grid">
            <button type="submit" class="btn btn-primary primary-btn fw-bold py-2" [disabled]="step2Form.invalid || isLoading">
              <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2"></span>
              {{ isLoading ? 'Resetting...' : 'Reset Password' }}
            </button>
          </div>
        </form>
      </div>
  
      <div class="text-center mt-4">
        <a routerLink="/login" class="text-secondary small text-decoration-none hover-text-white">
          <i class="bi bi-arrow-left me-1"></i> Back to Login
        </a>
      </div>
  
    </div>
  </div>
