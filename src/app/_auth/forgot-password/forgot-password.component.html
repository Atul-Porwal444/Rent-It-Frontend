<div class="auth-wrapper d-flex align-items-center justify-content-center">
  <div class="auth-card p-3 p-sm-4 rounded-4 shadow-lg text-center">
    
    <div *ngIf="step === 1" class="animate-fade-in">
      <div class="mx-auto d-flex align-items-center justify-content-center rounded-circle mb-3" 
           style="width: 50px; height: 50px; background-color: rgba(13, 110, 253, 0.15); color: #6ea8fe;">
        <i class="bi bi-key-fill" style="font-size: 1.4rem;"></i>
      </div>
      
      <h3 class="fw-bold text-white mb-1 card-title">Forgot Password?</h3>
      <p class="text-secondary small-text mb-3">No worries, we'll send you reset instructions.</p>

      <form (ngSubmit)="requestOtp()" #step1Form="ngForm">
        
        <div class="mb-3 text-start">
          <label class="form-label text-light input-label mb-1">Email Address</label>
          <input 
            type="email" 
            class="form-control custom-auth-input" 
            name="email"
            [(ngModel)]="form.email" 
            required
            email
            placeholder="Enter your registered email">
        </div>

        <div class="alert alert-danger bg-danger bg-opacity-10 border-danger border-opacity-25 text-danger py-1 px-2 small-text mb-3" *ngIf="errorMessage">
          <i class="bi bi-exclamation-circle-fill me-1"></i> {{ errorMessage }}
        </div>

        <div class="d-grid">
          <button type="submit" class="btn btn-primary primary-btn fw-bold py-1" [disabled]="step1Form.invalid || isLoading">
            <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" style="width: 1rem; height: 1rem;"></span>
            {{ isLoading ? 'Sending...' : 'Send Reset Code' }}
          </button>
        </div>
      </form>
    </div>

    <div *ngIf="step === 2" class="animate-fade-in">
      <div class="mx-auto d-flex align-items-center justify-content-center rounded-circle mb-3" 
           style="width: 50px; height: 50px; background-color: rgba(25, 135, 84, 0.15); color: #20c997;">
        <i class="bi bi-shield-lock-fill" style="font-size: 1.4rem;"></i>
      </div>
      
      <h3 class="fw-bold text-white mb-1 card-title">Set New Password</h3>
      <p class="text-secondary small-text mb-3">Code sent to <span class="text-white fw-bold">{{ form.email }}</span></p>

      <form (ngSubmit)="resetPassword()" #step2Form="ngForm">
        
        <div class="mb-2 text-start">
          <label class="form-label text-light input-label mb-1">6-Digit Code</label>
          <input 
            type="text" 
            class="form-control custom-auth-input text-center fw-bold letter-spacing-2" 
            [(ngModel)]="form.otp" 
            name="otp" 
            placeholder="••••••" 
            maxlength="6"
            required>
        </div>

        <div class="mb-2 text-start position-relative">
          <label class="form-label text-light input-label mb-1">New Password</label>
          <input 
            [type]="showPassword ? 'text' : 'password'" 
            class="form-control custom-auth-input pe-4" 
            name="newPassword"
            [(ngModel)]="form.newPassword" 
            required
            placeholder="Enter new password">
          <i class="bi position-absolute end-0 me-2 text-secondary" style="top: 34px; font-size: 0.8rem; cursor: pointer;"
             [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'" (click)="showPassword = !showPassword"></i>
        </div>

        <div class="mb-3 text-start">
          <label class="form-label text-light input-label mb-1">Confirm Password</label>
          <input 
            [type]="showPassword ? 'text' : 'password'" 
            class="form-control custom-auth-input" 
            name="confirmPassword"
            [(ngModel)]="form.confirmPassword" 
            required
            placeholder="Confirm new password">
        </div>

        <div class="alert alert-danger bg-danger bg-opacity-10 border-danger border-opacity-25 text-danger py-1 px-2 small-text mb-3" *ngIf="errorMessage">
          <i class="bi bi-exclamation-circle-fill me-1"></i> {{ errorMessage }}
        </div>

        <div class="d-grid">
          <button type="submit" class="btn btn-primary primary-btn fw-bold py-1" [disabled]="step2Form.invalid || isLoading">
            <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" style="width: 1rem; height: 1rem;"></span>
            {{ isLoading ? 'Resetting...' : 'Reset Password' }}
          </button>
        </div>
      </form>
    </div>

    <div class="text-center mt-3">
      <a routerLink="/login" class="text-secondary small-text text-decoration-none hover-text-white">
        <i class="bi bi-arrow-left me-1"></i> Back to Login
      </a>
    </div>

  </div>
</div>
